[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

# ══════════════════════════════════════════════════════════════════
#  INPUTS  —  one UDP port per vendor family.
#
#  GNS3 lab:   point each virtual appliance's syslog destination at
#              the matching port on your host IP.
#  Production: point the real device at the same port on this host.
#              Set ENVIRONMENT=production in .env — nothing else changes.
#
#  Port map:
#    514   generic / fallback (RFC 3164)
#    1514  Cisco ASA / ASAv / FTD
#    1515  Cisco IOS / IOS-XE / IOS-XR
#    1516  Cisco Firepower / FMC
#    1517  Cisco Stealthwatch
#    1518  Fortinet FortiGate
#    1519  Fortinet FortiWeb (WAF)
#    1520  Palo Alto PAN-OS (traffic logs)
#    1521  Palo Alto PAN-OS (threat logs)
#    1522  Juniper SRX / JunOS
#    1523  Check Point Firewall-1 / R80+
#    1524  Sophos XG / SFOS
#    1525  pfSense / OPNsense
#    1526  WatchGuard XTM / Firebox
#    1527  Untangle NG / Arista
#    1528  Snort / Suricata (EVE JSON via syslog)
#    1529  Zeek / Bro
#    1530  IPFire / Smoothwall / IPCop / iptables-based
# ══════════════════════════════════════════════════════════════════

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    514
    Tag     device.generic
    Parser  syslog-rfc3164

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1514
    Tag     device.cisco_asa
    Parser  cisco-asa

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1515
    Tag     device.cisco_ios
    Parser  cisco-ios

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1516
    Tag     device.cisco_firepower
    Parser  cisco-firepower

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1517
    Tag     device.cisco_stealthwatch
    Parser  cisco-stealthwatch

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1518
    Tag     device.fortigate
    Parser  fortigate-kv

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1519
    Tag     device.fortiweb
    Parser  fortiweb-kv

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1520
    Tag     device.paloalto_traffic
    Parser  paloalto-traffic

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1521
    Tag     device.paloalto_threat
    Parser  paloalto-threat

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1522
    Tag     device.juniper_srx
    Parser  juniper-srx

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1523
    Tag     device.checkpoint
    Parser  checkpoint-fw1

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1524
    Tag     device.sophos_xg
    Parser  sophos-xg

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1525
    Tag     device.pfsense
    Parser  pfsense-filterlog

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1526
    Tag     device.watchguard
    Parser  watchguard

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1527
    Tag     device.untangle
    Parser  untangle

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1528
    Tag     device.suricata
    Parser  suricata-eve-syslog

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1529
    Tag     device.zeek
    Parser  zeek-syslog

[INPUT]
    Name    syslog
    Mode    udp
    Listen  0.0.0.0
    Port    1530
    Tag     device.iptables
    Parser  iptables-kernel

# ══════════════════════════════════════════════════════════════════
#  ENRICHMENT FILTERS  —  stamp vendor + device type per tag.
#  This metadata rides through Kafka into OpenSearch so every log
#  is queryable by vendor/type without touching any other service.
# ══════════════════════════════════════════════════════════════════

[FILTER]
    Name    record_modifier
    Match   device.cisco_asa
    Record  vendor    cisco
    Record  dev_type  firewall
    Record  dev_model cisco_asa

[FILTER]
    Name    record_modifier
    Match   device.cisco_ios
    Record  vendor    cisco
    Record  dev_type  router
    Record  dev_model cisco_ios

[FILTER]
    Name    record_modifier
    Match   device.cisco_firepower
    Record  vendor    cisco
    Record  dev_type  ids_ips
    Record  dev_model cisco_firepower

[FILTER]
    Name    record_modifier
    Match   device.cisco_stealthwatch
    Record  vendor    cisco
    Record  dev_type  ndr
    Record  dev_model cisco_stealthwatch

[FILTER]
    Name    record_modifier
    Match   device.fortigate
    Record  vendor    fortinet
    Record  dev_type  firewall
    Record  dev_model fortigate

[FILTER]
    Name    record_modifier
    Match   device.fortiweb
    Record  vendor    fortinet
    Record  dev_type  waf
    Record  dev_model fortiweb

[FILTER]
    Name    record_modifier
    Match   device.paloalto_traffic
    Record  vendor    paloalto
    Record  dev_type  firewall
    Record  dev_model panos_traffic

[FILTER]
    Name    record_modifier
    Match   device.paloalto_threat
    Record  vendor    paloalto
    Record  dev_type  ids_ips
    Record  dev_model panos_threat

[FILTER]
    Name    record_modifier
    Match   device.juniper_srx
    Record  vendor    juniper
    Record  dev_type  firewall
    Record  dev_model srx

[FILTER]
    Name    record_modifier
    Match   device.checkpoint
    Record  vendor    checkpoint
    Record  dev_type  firewall
    Record  dev_model firewall1

[FILTER]
    Name    record_modifier
    Match   device.sophos_xg
    Record  vendor    sophos
    Record  dev_type  firewall
    Record  dev_model xg

[FILTER]
    Name    record_modifier
    Match   device.pfsense
    Record  vendor    netgate
    Record  dev_type  firewall
    Record  dev_model pfsense

[FILTER]
    Name    record_modifier
    Match   device.watchguard
    Record  vendor    watchguard
    Record  dev_type  firewall
    Record  dev_model xtm

[FILTER]
    Name    record_modifier
    Match   device.untangle
    Record  vendor    untangle
    Record  dev_type  utm
    Record  dev_model ng_firewall

[FILTER]
    Name    record_modifier
    Match   device.suricata
    Record  vendor    oisf
    Record  dev_type  ids_ips
    Record  dev_model suricata

[FILTER]
    Name    record_modifier
    Match   device.zeek
    Record  vendor    zeek
    Record  dev_type  ndr
    Record  dev_model zeek

[FILTER]
    Name    record_modifier
    Match   device.iptables
    Record  vendor    linux
    Record  dev_type  firewall
    Record  dev_model iptables

[FILTER]
    Name    record_modifier
    Match   device.generic
    Record  vendor    unknown
    Record  dev_type  unknown
    Record  dev_model unknown

# Stamp collector host and environment on every record
[FILTER]
    Name    record_modifier
    Match   device.*
    Record  collector_host  ${HOSTNAME}
    Record  environment     ${ENVIRONMENT}

# ══════════════════════════════════════════════════════════════════
#  WRAP  —  serialise each record to a plain string for the producer.
# ══════════════════════════════════════════════════════════════════

[FILTER]
    Name    lua
    Match   device.*
    script  wrap.lua
    call    wrap_logs

# ══════════════════════════════════════════════════════════════════
#  OUTPUT  →  Producer
#  PRODUCER_HOST / PRODUCER_PORT are env vars — swap them to point
#  at any environment without touching this file.
# ══════════════════════════════════════════════════════════════════

# ══ OUTPUT → Producer ══════════════════════════════════════════
[OUTPUT]
    Name              http
    Match             device.*
    Host              ${PRODUCER_HOST}
    Port              ${PRODUCER_PORT}
    URI               /v1/logs
    Format            json
    Header            Content-Type application/json
    Retry_Limit       3

# Temporary debug — remove after fixing cisco-asa parser
[OUTPUT]
    Name              stdout
    Match             device.cisco_asa
    Format            json_lines