# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
#  parsers.conf  ---  SOC AI Pipeline
#  Covers every major security vendor available in GNS3 / EVE-NG
#  plus common open-source IDS/IPS appliances.
#
#  Fallback chain:
#    vendor-specific parser  ---  syslog-rfc5424  ---  syslog-rfc3164
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# GENERIC FALLBACKS
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        syslog-rfc3164
    Format      regex
    Regex       ^\<(?<priority>[0-9]+)\>(?<time>[^ ]*[ ]?[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

[PARSER]
    Name        syslog-rfc5424
    Format      regex
    Regex       ^\<(?<priority>[0-9]{1,3})\>(?<version>[0-9]) (?<time>[^ ]+) (?<host>[^ ]+) (?<app>[^ ]+) (?<pid>[^ ]+) (?<msgid>[^ ]+) (?<extradata>(?:\[[^\]]*\])*|-) (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# CISCO --- ASA / ASAv / FTD
# Example: <166>Jun 01 12:00:00 asa1 : %ASA-6-106023: Deny tcp ...
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        cisco-asa
    Format      regex
    Regex       ^<(?<pri>[0-9]+)>(?<time>[A-Za-z]{3} [ 0-9]{1,2} [0-9]{2}:[0-9]{2}:[0-9]{2})(?:: |: %ASA-[0-9]-[0-9]+: |(?<host>[^ ]+) )(?:%ASA-[0-9]-[0-9]+: )?(?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# CISCO --- IOS / IOS-XE / IOS-XR (routers, switches)
# Example: <189>1234: Jun  1 12:00:00.123: %SEC-6-IPACCESSLOGP: ...
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        cisco-ios
    Format      regex
    # This regex handles: <PRI>SEQ: HOSTNAME: *TIMESTAMP: %FACILITY-SEV-MNEMONIC: MESSAGE
    Regex       /^<(?<pri>[0-9]+)>(?:(?<seq>[0-9]+): )?(?:(?<host>[^:]+): )?[\* \t]?(?<time>[A-Z][a-z]{2}\s+\d+\s+\d{2}:\d{2}:\d{2})(?:\.\d+)?[: ]*%(?<facility>[A-Z0-9_]+)-(?<severity>[0-7])-(?<mnemonic>[A-Z0-9_]+): (?<message>.*)$/
    Time_Key    time
    Time_Format %b %d %H:%M:%S

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# CISCO --- Firepower / FMC  (RFC 5424 structured data variant)
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        cisco-firepower
    Format      regex
    Regex       ^\<(?<priority>\d+)\>(?<version>\d) (?<time>[^ ]+) (?<host>[^ ]+) (?<app>SFIMS|SFSNORT|FTD) (?<pid>[^ ]+) (?<msgid>[^ ]+) \[(?<structured_data>[^\]]+)\] (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# CISCO --- Stealthwatch (NetFlow-based, syslog alerts)
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        cisco-stealthwatch
    Format      regex
    Regex       ^\<(?<priority>\d+)\>(?<time>[^ ]+ [^ ]+) (?<host>[^ ]+) StealthWatch\[(?<pid>[^\]]+)\]: (?<alarm_type>[^:]+): (?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# FORTINET --- FortiGate (key=value, space-separated)
# Example: date=2024-01-01 time=12:00:00 devname="FG100" type=traffic ...
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        fortigate-kv
    Format      regex
    Regex       ^(?<message>(?:\w+=(?:[^"][^ ]*|"[^"]*") *)+)$
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# FORTINET --- FortiWeb (WAF)
# Same key=value format as FortiGate, kept separate for tagging
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        fortiweb-kv
    Format      regex
    Regex       ^(?<message>(?:\w+=(?:[^"][^ ]*|"[^"]*") *)+)$
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# PALO ALTO --- PAN-OS (CSV syslog, pipe-delimited fields)
# Example: 1,2024/01/01 12:00:00,001234567890,TRAFFIC,end,...
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        paloalto-traffic
    Format      regex
    Regex       ^(?<receive_time>[^,]+),(?<serial>[^,]+),(?<type>TRAFFIC),(?<subtype>[^,]+),(?<time_generated>[^,]+),(?<src>[^,]+),(?<dst>[^,]+),(?<natsrc>[^,]+),(?<natdst>[^,]+),(?<rule>[^,]+),(?<srcuser>[^,]+),(?<dstuser>[^,]+),(?<app>[^,]+),(?<vsys>[^,]+),(?<from>[^,]+),(?<to>[^,]+),(?<inbound_if>[^,]+),(?<outbound_if>[^,]+),(?<logset>[^,]+),(?<sessionid>[^,]+),(?<repeatcnt>[^,]+),(?<sport>[^,]+),(?<dport>[^,]+),(?<natsport>[^,]+),(?<natdport>[^,]+),(?<flags>[^,]+),(?<proto>[^,]+),(?<action>[^,]+),(?<bytes>[^,]+),(?<bytes_sent>[^,]+),(?<bytes_received>[^,]+),(?<packets>[^,]+),(?<start>[^,]+),(?<sec>[^,]+),(?<category>[^,]+),(?<message>.*)$
    Time_Key    time_generated
    Time_Format %Y/%m/%d %H:%M:%S
    Time_Keep   On

[PARSER]
    Name        paloalto-threat
    Format      regex
    Regex       ^(?<receive_time>[^,]+),(?<serial>[^,]+),(?<type>THREAT),(?<subtype>[^,]+),(?<time_generated>[^,]+),(?<src>[^,]+),(?<dst>[^,]+),(?<natsrc>[^,]+),(?<natdst>[^,]+),(?<rule>[^,]+),(?<srcuser>[^,]+),(?<dstuser>[^,]+),(?<app>[^,]+),(?<vsys>[^,]+),(?<from>[^,]+),(?<to>[^,]+),(?<inbound_if>[^,]+),(?<outbound_if>[^,]+),(?<logset>[^,]+),(?<sessionid>[^,]+),(?<repeatcnt>[^,]+),(?<sport>[^,]+),(?<dport>[^,]+),(?<natsport>[^,]+),(?<natdport>[^,]+),(?<flags>[^,]+),(?<proto>[^,]+),(?<action>[^,]+),(?<threatid>[^,]+),(?<category>[^,]+),(?<severity>[^,]+),(?<direction>[^,]+),(?<message>.*)$
    Time_Key    time_generated
    Time_Format %Y/%m/%d %H:%M:%S
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# JUNIPER --- SRX (JunOS structured syslog, RT_FLOW events)
# Example: <14>1 2024-01-01T12:00:00.000Z srx1 RT_FLOW - - [junos@2636 ... ]
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        juniper-srx
    Format      regex
    Regex       ^\<(?<priority>\d+)\>(?<version>\d) (?<time>[^ ]+) (?<host>[^ ]+) (?<process>[^ ]+) (?<pid>[^ ]+) (?<msgid>[^ ]+) \[(?<structured_data>[^\]]+)\] (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# CHECK POINT --- Firewall-1 / R80+ (semicolon-delimited k=v)
# Example: <13>Sep 30 07:13:59 cpfw product: VPN-1 &FireWall-1; src: 1.2.3.4; ...
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        checkpoint-fw1
    Format      regex
    Regex       ^\<(?<priority>\d+)\>(?<time>\w+ +\d+ \d+:\d+:\d+) (?<host>\S+) (?<product>[^;]+); (?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# SOPHOS --- XG / SFOS  (key=value, double-quoted values)
# Example: <14>device="SFW" date=2024-01-01 time=12:00:00 ...
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        sophos-xg
    Format      regex
    Regex       ^\<(?<priority>\d+)\>(?<message>device=[^ ]+ .*)$
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# pfSENSE / OPNsense  (filterlog prefix + CSV for firewall rules,
#                       standard syslog for daemon events)
# Example: <134>Jan  1 12:00:00 pfsense filterlog[12345]: 4,,,rule,...
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        pfsense-filterlog
    Format      regex
    Regex       ^\<(?<priority>\d+)\>(?<time>\w+ +\d+ \d+:\d+:\d+) (?<host>[^ ]+) filterlog\[(?<pid>[^\]]+)\]: (?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# WATCHGUARD --- XTM / Firebox  (key=value, msg= field)
# Example: <14>2024-01-01 12:00:00 WG firewall msg_id="3000-0148" ...
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        watchguard
    Format      regex
    Regex       ^\<(?<priority>\d+)\>(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (?<host>\S+) (?<app>\S+) (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# UNTANGLE / ARISTA (standard RFC 3164 variant --- alias to fallback)
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        untangle
    Format      regex
    Regex       ^\<(?<priority>[0-9]+)\>(?<time>[^ ]*[ ]?[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# SNORT / SURICATA --- EVE JSON  (when configured to syslog JSON)
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        suricata-eve-syslog
    Format      regex
    Regex       ^\<(?<priority>\d+)\>(?<time>\w+ +\d+ \d+:\d+:\d+) (?<host>[^ ]+) suricata(?:\[(?<pid>\d+)\])?: (?<message>\{.*\})$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# ZEEK (Bro) --- syslog forwarded JSON
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        zeek-syslog
    Format      regex
    Regex       ^\<(?<priority>\d+)\>(?<time>\w+ +\d+ \d+:\d+:\d+) (?<host>[^ ]+) bro(?:\[(?<pid>\d+)\])?: (?<message>\{.*\})$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# IPFIRE / SMOOTHWALL / IPCOP  (standard iptables-style syslog)
# Example: <4>Jan  1 12:00:00 ipfire kernel: IN=eth1 OUT= MAC=... SRC=...
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        iptables-kernel
    Format      regex
    Regex       ^\<(?<priority>\d+)\>(?<time>\w+ +\d+ \d+:\d+:\d+) (?<host>\S+) kernel: (?<chain>[A-Z_\-]+)?(?<message>IN=\S* .*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# Docker JSON (kept from original config)
# ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On