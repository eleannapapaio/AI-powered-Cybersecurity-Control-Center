<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c10;
    --surface:   #0d1117;
    --surface2:  #131a22;
    --border:    #1e2d3d;
    --accent:    #00d4ff;
    --accent2:   #ff4757;
    --accent3:   #2ecc71;
    --warn:      #f39c12;
    --text:      #c9d1d9;
    --text-dim:  #4a5568;
    --text-mono: 'Share Tech Mono', monospace;
    --text-ui:   'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--text-ui);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── scanline overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.015) 2px,
      rgba(0,212,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 12px rgba(0,212,255,0.3);
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 12px rgba(0,212,255,0.3); }
    50%       { box-shadow: 0 0 24px rgba(0,212,255,0.6); }
  }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    font-family: var(--text-mono);
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: var(--text-mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .session-id {
    color: var(--text-dim);
    font-size: 11px;
  }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--text-mono);
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-clear:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* ── main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── sidebar ── */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .sidebar-label {
    font-family: var(--text-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    padding: 0 16px 8px;
    text-transform: uppercase;
  }

  .quick-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text);
    text-align: left;
    font-family: var(--text-ui);
    font-size: 13px;
    font-weight: 400;
    line-height: 1.4;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    width: 100%;
  }

  .quick-btn:hover {
    background: var(--surface2);
    border-left-color: var(--accent);
    color: var(--accent);
  }

  .quick-btn .qicon {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 12px 16px;
  }

  /* ── chat area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── welcome screen ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px;
  }

  .welcome-icon { font-size: 48px; opacity: 0.4; }

  .welcome h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 1px;
  }

  .welcome p {
    font-size: 14px;
    max-width: 440px;
    line-height: 1.7;
    font-family: var(--text-mono);
  }

  /* ── message bubbles ── */
  .msg {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    animation: fadeSlideIn 0.3s ease;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .msg.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .msg.assistant .msg-avatar {
    background: rgba(0,212,255,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px rgba(0,212,255,0.2);
  }

  .msg-body { max-width: 780px; }

  .msg-meta {
    font-family: var(--text-mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .msg.user .msg-meta { justify-content: flex-end; }

  .intent-badge {
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .intent-retrieval   { background: rgba(0,212,255,0.15); color: var(--accent); }
  .intent-correlation { background: rgba(243,156,18,0.15); color: var(--warn); }
  .intent-remediation { background: rgba(46,204,113,0.15); color: var(--accent3); }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.7;
  }

  .msg.user .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--text-mono);
    font-size: 13px;
  }

  .msg.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
  }

  /* markdown-ish rendering */
  .msg-bubble h2, .msg-bubble h3 {
    color: var(--accent);
    font-family: var(--text-ui);
    font-weight: 700;
    letter-spacing: 1px;
    margin: 14px 0 8px;
    font-size: 14px;
    text-transform: uppercase;
  }

  .msg-bubble h2:first-child, .msg-bubble h3:first-child { margin-top: 0; }

  .msg-bubble p { margin-bottom: 10px; }
  .msg-bubble p:last-child { margin-bottom: 0; }

  .msg-bubble ul, .msg-bubble ol {
    padding-left: 20px;
    margin-bottom: 10px;
  }

  .msg-bubble li { margin-bottom: 4px; }

  .msg-bubble code {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--text-mono);
    font-size: 12px;
    color: var(--accent);
  }

  .msg-bubble pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    margin: 10px 0;
    font-family: var(--text-mono);
    font-size: 12px;
    line-height: 1.6;
  }

  .msg-bubble pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text);
  }

  .msg-bubble strong { color: #e2e8f0; font-weight: 700; }

  .msg-bubble table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--text-mono);
    font-size: 12px;
    margin: 10px 0;
  }

  .msg-bubble th {
    background: var(--surface2);
    color: var(--accent);
    padding: 8px 12px;
    text-align: left;
    border: 1px solid var(--border);
    letter-spacing: 1px;
    font-size: 11px;
  }

  .msg-bubble td {
    padding: 7px 12px;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .msg-bubble tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* ── thinking indicator ── */
  .thinking {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    font-family: var(--text-mono);
    font-size: 12px;
    color: var(--accent);
  }

  .thinking-dots {
    display: flex; gap: 4px;
  }

  .thinking-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40%            { transform: scale(1);   opacity: 1; }
  }

  /* ── input bar ── */
  .input-bar {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--text-mono);
    font-size: 13px;
    padding: 12px 16px;
    resize: none;
    min-height: 48px;
    max-height: 160px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.1);
  }

  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 48px; height: 48px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    color: var(--bg);
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 0 16px rgba(0,212,255,0.3);
  }

  .send-btn:hover { background: #33ddff; box-shadow: 0 0 24px rgba(0,212,255,0.5); }
  .send-btn:disabled { background: var(--border); box-shadow: none; cursor: not-allowed; }

  .input-hint {
    font-family: var(--text-mono);
    font-size: 10px;
    color: var(--text-dim);
    padding: 4px 0 0 2px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🛡</div>
    <div>
      <div class="logo-text">SOC Assistant</div>
      <div class="logo-sub">Security Operations Center · AI Analyst</div>
    </div>
  </div>
  <div class="header-status">
    <span><span class="status-dot"></span> LIVE</span>
    <span class="session-id" id="sessionDisplay">NO SESSION</span>
    <button class="btn-clear" onclick="clearSession()">⟳ NEW SESSION</button>
  </div>
</header>

<div class="main">

  <!-- sidebar -->
  <div class="sidebar">
    <div class="sidebar-label">Quick Queries</div>

    <button class="quick-btn" onclick="ask('Show me the latest critical events on my infrastructure')">
      <span class="qicon">🔴</span>
      <span>Latest critical events</span>
    </button>
    <button class="quick-btn" onclick="ask('Show me all ERROR level logs in the last hour')">
      <span class="qicon">⚠️</span>
      <span>Errors last hour</span>
    </button>
    <button class="quick-btn" onclick="ask('Which services have the most failures?')">
      <span class="qicon">📊</span>
      <span>Service failure summary</span>
    </button>

    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Correlation</div>

    <button class="quick-btn" onclick="ask('Can you correlate between the events and tell me if there is an attack taking place?')">
      <span class="qicon">🔍</span>
      <span>Detect potential attack</span>
    </button>
    <button class="quick-btn" onclick="ask('Are there any suspicious IP addresses making repeated failed requests?')">
      <span class="qicon">🌐</span>
      <span>Suspicious IPs</span>
    </button>
    <button class="quick-btn" onclick="ask('Is there any unusual pattern of database connection failures?')">
      <span class="qicon">🗄️</span>
      <span>DB connection anomalies</span>
    </button>

    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Remediation</div>

    <button class="quick-btn" onclick="ask('How can I block the suspicious activity you found?')">
      <span class="qicon">🛡️</span>
      <span>Block suspicious activity</span>
    </button>
    <button class="quick-btn" onclick="ask('What steps should I take to fix the database connection issues?')">
      <span class="qicon">🔧</span>
      <span>Fix DB issues</span>
    </button>
  </div>

  <!-- chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🛡</div>
        <h2>SOC ASSISTANT ONLINE</h2>
        <p>Ask me about your infrastructure logs. I can retrieve events, correlate anomalies, and suggest remediation steps.</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea
          id="input"
          placeholder="Ask about your infrastructure... (Enter to send, Shift+Enter for new line)"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <div class="input-hint">↵ send &nbsp;·&nbsp; ⇧↵ new line</div>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<script>
  // ── marked.js for markdown rendering ──────────────────────────────────────
  const BOLD   = /\*\*(.*?)\*\*/g;
  const ITALIC = /\*(.*?)\*/g;
  const CODE_BLOCK = /```[\w]*\n?([\s\S]*?)```/g;
  const INLINE_CODE = /`([^`]+)`/g;
  const H3 = /^### (.+)$/gm;
  const H2 = /^## (.+)$/gm;
  const H1 = /^# (.+)$/gm;
  const UL = /^[-*] (.+)$/gm;
  const OL = /^\d+\. (.+)$/gm;
  const HR = /^---$/gm;
  const TABLE_RE = /^\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/gm;

  function renderMarkdown(text) {
    // tables
    text = text.replace(TABLE_RE, (_, header, rows) => {
      const ths = header.split('|').map(s => s.trim()).filter(Boolean)
        .map(h => `<th>${h}</th>`).join('');
      const trs = rows.trim().split('\n').map(row => {
        const tds = row.split('|').map(s => s.trim()).filter(Boolean)
          .map(d => `<td>${d}</td>`).join('');
        return `<tr>${tds}</tr>`;
      }).join('');
      return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    });
    text = text.replace(CODE_BLOCK, (_, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
    text = text.replace(H3, (_, t) => `<h3>${t}</h3>`);
    text = text.replace(H2, (_, t) => `<h2>${t}</h2>`);
    text = text.replace(H1, (_, t) => `<h2>${t}</h2>`);
    text = text.replace(HR, '<hr style="border-color:var(--border);margin:12px 0">');
    // lists
    text = text.replace(/((?:^[-*] .+\n?)+)/gm, m => {
      const items = m.trim().split('\n').map(l => `<li>${l.replace(/^[-*] /,'')}</li>`).join('');
      return `<ul>${items}</ul>`;
    });
    text = text.replace(/((?:^\d+\. .+\n?)+)/gm, m => {
      const items = m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /,'')}</li>`).join('');
      return `<ol>${items}</ol>`;
    });
    text = text.replace(INLINE_CODE, (_, c) => `<code>${escapeHtml(c)}</code>`);
    text = text.replace(BOLD,   (_, t) => `<strong>${t}</strong>`);
    text = text.replace(ITALIC, (_, t) => `<em>${t}</em>`);
    // paragraphs
    text = text.split('\n\n').map(p => {
      p = p.trim();
      if (!p) return '';
      if (/^<(h[1-6]|ul|ol|pre|table|hr)/.test(p)) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');
    return text;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── state ──────────────────────────────────────────────────────────────────
  let sessionId  = null;
  let isThinking = false;

  function updateSessionDisplay() {
    const el = document.getElementById('sessionDisplay');
    el.textContent = sessionId ? 'SESSION: ' + sessionId.slice(0,8).toUpperCase() : 'NO SESSION';
  }

  // ── send ───────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('input');
    const question = input.value.trim();
    if (!question || isThinking) return;

    // hide welcome
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    addUserMessage(question);
    input.value = '';
    autoResize(input);

    const thinkingEl = addThinking();
    setThinking(true);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, session_id: sessionId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Server error');

      sessionId = data.session_id;
      updateSessionDisplay();

      thinkingEl.remove();
      addAssistantMessage(data.answer, data.intent, data.results_count);
    } catch (err) {
      thinkingEl.remove();
      addAssistantMessage(`⚠️ Error: ${err.message}`, 'error', 0);
    } finally {
      setThinking(false);
    }
  }

  function ask(question) {
    document.getElementById('input').value = question;
    sendMessage();
  }

  // ── DOM helpers ────────────────────────────────────────────────────────────
  function addUserMessage(text) {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `
      <div class="msg-avatar">👤</div>
      <div class="msg-body">
        <div class="msg-meta">YOU &nbsp;·&nbsp; ${now()}</div>
        <div class="msg-bubble">${escapeHtml(text)}</div>
      </div>`;
    msgs.appendChild(div);
    scrollBottom();
  }

  function addAssistantMessage(text, intent, count) {
    const msgs  = document.getElementById('messages');
    const div   = document.createElement('div');
    div.className = 'msg assistant';
    const badge = intent && intent !== 'error'
      ? `<span class="intent-badge intent-${intent}">${intent}</span>`
      : '';
    const countTxt = count > 0 ? `${count} log(s) analyzed` : '';
    div.innerHTML = `
      <div class="msg-avatar">🛡</div>
      <div class="msg-body">
        <div class="msg-meta">SOC ANALYST &nbsp;·&nbsp; ${now()} &nbsp; ${badge} &nbsp; <span style="color:var(--text-dim)">${countTxt}</span></div>
        <div class="msg-bubble">${renderMarkdown(text)}</div>
      </div>`;
    msgs.appendChild(div);
    scrollBottom();
  }

  function addThinking() {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `
      <div class="msg-avatar">🛡</div>
      <div class="msg-body">
        <div class="msg-meta">SOC ANALYST &nbsp;·&nbsp; ${now()}</div>
        <div class="thinking">
          <span>Analyzing logs</span>
          <div class="thinking-dots"><span></span><span></span><span></span></div>
        </div>
      </div>`;
    msgs.appendChild(div);
    scrollBottom();
    return div;
  }

  function scrollBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function setThinking(val) {
    isThinking = val;
    document.getElementById('sendBtn').disabled = val;
  }

  function now() {
    return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  // ── clear session ──────────────────────────────────────────────────────────
  async function clearSession() {
    if (sessionId) {
      await fetch(`/history/${sessionId}`, { method: 'DELETE' }).catch(() => {});
    }
    sessionId = null;
    updateSessionDisplay();
    const msgs = document.getElementById('messages');
    msgs.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🛡</div>
        <h2>SOC ASSISTANT ONLINE</h2>
        <p>Ask me about your infrastructure logs. I can retrieve events, correlate anomalies, and suggest remediation steps.</p>
      </div>`;
  }

  // ── textarea auto resize ───────────────────────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }
</script>
</body>
</html>
